# VLA AttnRes for LIBERO tasks
model:
  d_model: 1024
  n_heads: 16
  n_layers: 16
  n_blocks: 8
  d_ff: 4096
  vocab_size: 32000
  max_seq_len: 2048
  dropout: 0.1
  attn_res_temperature: 1.0

vision:
  vision_dim: 1024  # SigLIP/Qwen2.5-VL output dim
  vision_patch_size: 14
  vision_seq_len: 256

action:
  action_dim: 7
  action_chunk_size: 16

skipping:
  enable_skipping: false  # Enable at inference
  vision_skip_threshold: 0.02
  language_skip_threshold: 0.01
  action_skip_threshold: 0.005
  modality_aware_routing: true

training:
  batch_size: 32
  lr: 1e-4
  weight_decay: 0.01
  epochs: 50
  warmup_steps: 2000
