# Standard AttnRes - Small model for rapid iteration
model:
  d_model: 768
  n_heads: 12
  n_layers: 12
  n_blocks: 4
  d_ff: 3072
  vocab_size: 32000
  max_seq_len: 1024
  dropout: 0.1
  attn_res_temperature: 1.0

training:
  batch_size: 64
  lr: 3e-4
  weight_decay: 0.1
  epochs: 20
  warmup_steps: 1000
  max_grad_norm: 1.0

evaluation:
  skip_thresholds: [0.0, 0.001, 0.005, 0.01, 0.02, 0.05, 0.1]
